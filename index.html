<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Liquidación de Tenis</title>

<style>
body{font-family:Arial;background:#f5f5f5;margin:0}
.wrap{max-width:1000px;margin:auto;padding:20px}
.card{background:white;padding:15px;border-radius:10px;margin-bottom:15px}
.product{display:flex;gap:15px}
.product img{width:140px;border-radius:10px}
.btn{background:#0b72ff;color:white;border:none;padding:10px;border-radius:8px;cursor:pointer}
.cart-item{border-bottom:1px solid #ddd;padding:8px 0}
input, textarea{width:100%;padding:8px;margin-bottom:10px;border-radius:8px;border:1px solid #ccc}
</style>
</head>

<body>

<div class="wrap">

<h2>🔥 Liquidación de Tenis</h2>

<div class="card">
  <div class="product">
    
    <img id="productImage"
    src="https://img.ltwebstatic.com/images3_spmp/2024/08/03/8d/17226306575e31aae8af3c83cf2350f7b7fa7dfffa_thumbnail_750x999.jpg">

    <div>
      <h3 id="productTitle">Tenis Clásicos</h3>
      <p>$50 MXN</p>

      <label>Talla</label>
      <select id="size">
        <option>23</option>
        <option>25</option>
        <option>26</option>
        <option>27</option>
      </select>

      <label>Cantidad</label>
      <select id="qty">
        <option>1</option>
        <option>2</option>
        <option>3</option>
      </select>

      <br><br>
      <button class="btn" onclick="addCart()">Agregar al carrito</button>
    </div>

  </div>
</div>

<div class="card">
  <h3>🛒 Carrito</h3>
  <div id="cart">Carrito vacío</div>
  <p><strong>Total: $<span id="total">0</span></strong></p>
</div>

<div class="card">
  <h3>📦 Datos del cliente</h3>

  <input id="name" placeholder="Nombre completo">
  <input id="phone" placeholder="Teléfono">
  <textarea id="address" placeholder="Dirección completa"></textarea>

</div>

<div class="card">
  <h3>💳 Pago</h3>

  <p><strong>Pago en OXXO / Transferencia:</strong></p>
  <p>Número: <strong>5101257664722736</strong></p>
  <p>Banco: NU México</p>

  <p>Después de pagar, envía tu comprobante dando clic abajo 👇</p>

  <button class="btn" onclick="sendWhats()">Enviar pedido por WhatsApp</button>
</div>

</div>

<script>
let cart = [];

function addCart(){
  const title = document.getElementById("productTitle").innerText;
  const size = document.getElementById("size").value;
  const qty = parseInt(document.getElementById("qty").value);
  const price = 50;

  cart.push({title,size,qty,price});
  renderCart();
}

function renderCart(){
  let html = "";
  let total = 0;

  cart.forEach((item)=>{
    total += item.qty * item.price;

    html += `
      <div class="cart-item">
        ${item.title} - Talla ${item.size} x${item.qty}
      </div>
    `;
  });

  document.getElementById("cart").innerHTML = html || "Carrito vacío";
  document.getElementById("total").innerText = total;
}

function sendWhats(){
  if(cart.length === 0){
    alert("Carrito vacío");
    return;
  }

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const address = document.getElementById("address").value;

  if(!name || !phone || !address){
    alert("Completa todos los datos");
    return;
  }

  let message = `🛒 *PEDIDO*%0A`;

  cart.forEach(item=>{
    message += `- ${item.title} Talla ${item.size} x${item.qty}%0A`;
  });

  message += `%0ATotal: $${document.getElementById("total").innerText}`;
  message += `%0A%0A👤 Nombre: ${name}`;
  message += `%0A📞 Teléfono: ${phone}`;
  message += `%0A📍 Dirección: ${address}`;
  message += `%0A%0A💳 Pagado a: 5101257664722736 (NU México)`;
  message += `%0A📸 Enviar comprobante aquí`;

  window.open(`https://wa.me/527226340394?text=${message}`);
}
</script>

</body>
</html>
